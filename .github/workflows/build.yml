name: Build magichancer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # lets the user run it manually from the GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact-path: build/magichancer_artefacts/Release/VST3/magichancer.vst3
          - os: macos-latest
            name: macOS
            artifact-path: build/magichancer_artefacts/Release/VST3/magichancer.vst3
          - os: ubuntu-22.04
            name: Linux
            artifact-path: build/magichancer_artefacts/Release/VST3/magichancer.vst3

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Platform-specific prep ----------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxext-dev libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libcurl4-openssl-dev pkg-config ninja-build

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      # ---------- Cache JUCE so subsequent runs are fast ----------
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.4-${{ runner.os }}

      # ---------- Configure ----------
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      # ---------- Build ----------
      - name: Build
        run: cmake --build build --config Release --parallel

      # ---------- Upload artifacts ----------
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: magichancer-${{ matrix.name }}-VST3
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: magichancer-${{ matrix.name }}-Standalone
          path: |
            build/magichancer_artefacts/Release/Standalone/magichancer*
            !**/*.pdb
          if-no-files-found: warn
